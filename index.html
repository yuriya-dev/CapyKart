  <style>
    body {
      margin: 0;
      user-select: none;
      -webkit-user-select: none;
    }
    canvas {
      display: block;
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      touch-action: none;
      z-index: 0;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }
    .glossy-overlay {
      background: linear-gradient(180deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 50%);
    }
    .btn-3d-press:active {
      transform: translateY(4px);
      box-shadow: 0 0px 0 0 rgba(0,0,0,0.2) !important;
    }
    .card-outline {
      border: 4px solid #1a1c1c;
    }
    .stadium-bg {
      background: linear-gradient(180deg, #1e88e5 0%, #bb171c 100%);
      position: relative;
      overflow: hidden;
    }
    .stadium-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.15) 0%, transparent 20%),
        radial-gradient(circle at 80% 10%, rgba(255,255,255,0.15) 0%, transparent 25%);
      opacity: 0.6;
    }
    .nav-item-active {
      background-color: #47a1ff;
      color: #ffffff;
      border: 2px solid #1a1c1c;
      box-shadow: 0 2px 0 0 rgba(0,0,0,0.2);
    }
    #landing-page {
      position: relative;
      z-index: 10;
      display: none;
    }
    #ui-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .clickable {
      pointer-events: auto;
      cursor: pointer;
    }
    #loading-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, #1e88e5 0%, #bb171c 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #ffffff;
      z-index: 1000;
      transition: opacity 0.5s ease;
    }
    .progress-bar {
      width: 280px;
      height: 10px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      overflow: hidden;
      border: 2px solid #1a1c1c;
    }
    .progress-fill {
      width: 0%;
      height: 100%;
      background: #ffe16e;
      transition: width 0.1s ease;
    }
    #hud { display: none; }
    #countdown-screen { display: none; }
    #results-screen { display: none; }
    .light-circle {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #1a1a24;
      border: 2px solid #2d2d3a;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
      transition: background 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .light-red {
      background: radial-gradient(circle, #ff3b30 0%, #a7140d 100%) !important;
      border-color: #ff6b62 !important;
      box-shadow: 0 0 25px #ff3b30, inset 0 0 8px rgba(255,255,255,0.6) !important;
    }
    .light-green {
      background: radial-gradient(circle, #4cd964 0%, #147a24 100%) !important;
      border-color: #72f287 !important;
      box-shadow: 0 0 30px #4cd964, inset 0 0 8px rgba(255,255,255,0.6) !important;
    }
    @keyframes countdown-pulse {
      0% { transform: scale(1.0); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1.0); }
    }
    #countdown-text {
      animation: countdown-pulse 1s infinite;
    }
  </style>
</head>

      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="font-title-md mt-4 text-white/90" id="loading-status">Mengunduh aset 3D sirkuit...</div>
    </div>

    <div id="hud" class="absolute inset-0">
      <div class="absolute top-6 left-6 bg-white card-outline rounded-2xl px-5 py-3 font-title-md shadow-[0_4px_0_0_rgba(0,0,0,0.2)]" id="hud-lap">LAP: 1 / 3</div>

        <span class="text-sm text-on-surface-variant" id="hud-best-time">BEST: --:--.--</span>
      </div>

      <div class="absolute bottom-6 left-6 flex flex-col gap-3">

          <!-- 3 segments representing 3 Solana coins -->
          <div class="flex gap-2 w-[180px]">

              <img src="solana.svg" class="h-5 w-5 drop-shadow-[0_0_4px_rgba(0,255,163,0.5)]" alt="Solana Bubble">
            </div>
            <div id="booster-seg-3" class="flex-1 h-8 bg-surface border-2 border-on-surface rounded-lg flex items-center justify-center transition-all duration-300 opacity-30 scale-95">

        </div>
      </div>

        <div class="flex justify-between border-b-2 border-on-surface/10 pb-2"><span>Total Waktu:</span><span id="res-total-time">--:--.--</span></div>
        <div class="flex justify-between border-b-2 border-on-surface/10 pb-2"><span>Best Lap:</span><span id="res-best-time">--:--.--</span></div>
        <div class="flex justify-between border-b-2 border-on-surface/10 pb-2"><span>Koin SOL:</span><span id="res-coins">0 / 5</span></div>
        <div class="flex justify-between"><span>Total Skor:</span><span id="res-score">0</span></div>
      </div>
      <button id="btn-replay" type="button" class="clickable w-full btn-3d-press bg-tertiary-fixed text-on-tertiary-fixed font-headline-lg py-4 rounded-2xl border-4 border-on-surface shadow-[0_8px_0_0_rgba(0,0,0,0.3)]">MAIN LAGI</button>
    </div>

    <div id="countdown-screen" class="absolute inset-0 flex flex-col justify-center items-center bg-black/40">
      <div id="countdown-lights" class="flex gap-4 mb-6 bg-black/60 px-7 py-4 rounded-full border-2 border-white/20">
        <div class="light-circle" id="light-1"></div>
        <div class="light-circle" id="light-2"></div>
        <div class="light-circle" id="light-3"></div>
        <div class="light-circle" id="light-4"></div>
        <div class="light-circle" id="light-5"></div>
      </div>
      <div id="countdown-text" class="font-display-hero text-[8rem] text-white drop-shadow-lg">10</div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
  <script>
    document.querySelectorAll('.btn-3d-press').forEach(btn => {
      btn.addEventListener('mousedown', () => {
        btn.style.boxShadow = '0 0px 0 0 rgba(0,0,0,0.2)';
      });
      btn.addEventListener('mouseup', () => {
        btn.style.boxShadow = '';
      });
    });
  </script>
</body>
</html>
